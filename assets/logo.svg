<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
  <!-- canon-dev logo: stylized rocket on a foundation block ("канон" = базис, ракета = запуск) -->

  <!-- Foundation block (канон) -->
  <rect x="18" y="76" width="60" height="8" rx="2" fill="#0E2A66"/>
  <line x1="22" y1="80" x2="74" y2="80" stroke="#3B6EE8" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.6"/>

  <!-- Rocket body -->
  <path d="M 48 8 L 60 36 L 60 64 L 48 70 L 36 64 L 36 36 Z" fill="#1E3A8A" stroke="#0E2A66" stroke-width="1"/>

  <!-- Rocket window -->
  <circle cx="48" cy="40" r="6" fill="#E8EFFB" stroke="#0E2A66" stroke-width="1.25"/>
  <circle cx="48" cy="40" r="3" fill="#3B6EE8" opacity="0.6"/>

  <!-- Body seam -->
  <line x1="48" y1="14" x2="48" y2="64" stroke="#0E2A66" stroke-width="0.5" opacity="0.4"/>

  <!-- Left fin -->
  <path d="M 36 56 L 26 70 L 36 66 Z" fill="#2C53C9" stroke="#0E2A66" stroke-width="1"/>

  <!-- Right fin -->
  <path d="M 60 56 L 70 70 L 60 66 Z" fill="#2C53C9" stroke="#0E2A66" stroke-width="1"/>

  <!-- Exhaust flame (subtle) -->
  <path d="M 42 70 Q 48 76 54 70 L 50 74 L 48 78 L 46 74 Z" fill="#D9883D" opacity="0.85"/>
  <path d="M 44 71 Q 48 75 52 71 L 50 73 L 48 76 L 46 73 Z" fill="#FBEFDF"/>

  <!-- Three small dots representing canon levels -->
  <circle cx="14" cy="44" r="1.5" fill="#1E3A8A"/>
  <circle cx="14" cy="50" r="1.5" fill="#1E3A8A" opacity="0.6"/>
  <circle cx="14" cy="56" r="1.5" fill="#1E3A8A" opacity="0.3"/>
</svg>
